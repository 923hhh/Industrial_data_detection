<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工业故障诊断 - 流式控制台</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    h1 {
      font-size: 1.2rem;
      color: #58a6ff;
      margin-bottom: 24px;
      letter-spacing: 2px;
    }

    .page-links {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin: -10px 0 14px;
    }

    .page-links a {
      color: #79c0ff;
      text-decoration: none;
      border: 1px solid #30363d;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.78rem;
      transition: 0.2s ease;
    }

    .page-links a:hover {
      border-color: #58a6ff;
      background: rgba(88, 166, 255, 0.08);
    }

    .panel {
      width: 100%;
      max-width: 900px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }

    /* === 输入区 === */
    .input-bar {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid #30363d;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .field { display: flex; flex-direction: column; gap: 4px; }
    .field-wide { flex: 1 1 260px; min-width: 240px; }

    label {
      font-size: 0.72rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input[type="text"], input[type="datetime-local"] {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #e6edf3;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.2s;
      width: 200px;
    }

    input[type="text"]:focus, input[type="datetime-local"]:focus {
      border-color: #58a6ff;
    }

    input.symptom { width: 260px; }
    input.backend-url { width: 100%; }

    .field-note {
      color: #8b949e;
      font-size: 0.72rem;
      line-height: 1.4;
      max-width: 320px;
    }

    button {
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 8px 18px;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button:hover { background: #2ea043; }
    button:disabled { background: #21262d; border-color: #30363d; cursor: not-allowed; }

    /* === 终端区 === */
    .terminal {
      height: 480px;
      overflow-y: auto;
      padding: 16px;
      font-size: 0.82rem;
      line-height: 1.7;
      scroll-behavior: smooth;
    }

    .terminal p { margin-bottom: 2px; }

    .event-node_start  { color: #79c0ff; }
    .event-node_finish { color: #7ee787; }
    .event-report      { color: #f0883e; font-weight: bold; }
    .event-error       { color: #ff7b72; }
    .event-done        { color: #8b949e; font-style: italic; }
    .event-timestamp   { color: #484f58; }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: #58a6ff;
      animation: blink 1s step-end infinite;
      vertical-align: middle;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ============================================================
       Markdown 渲染报告样式（与终端深色主题一致）
       ============================================================ */
    .md-report {
      background: #0d1117;
      border: 1px solid #30363d;
      border-left: 3px solid #f0883e;
      border-radius: 6px;
      padding: 14px 18px;
      margin: 6px 0;
      font-size: 0.8rem;
      line-height: 1.8;
      color: #e6edf3;
    }

    .md-report h1, .md-report h2, .md-report h3 {
      color: #f0883e;
      margin: 0 0 8px 0;
    }

    .md-report h1 { font-size: 1rem; letter-spacing: 1px; }
    .md-report h2 { font-size: 0.9rem; color: #ffa657; }
    .md-report h3 { font-size: 0.85rem; color: #d2a8ff; }

    .md-report p {
      margin: 4px 0;
      color: #c9d1d9;
    }

    .md-report ul, .md-report ol {
      margin: 6px 0;
      padding-left: 20px;
      color: #c9d1d9;
    }

    .md-report li {
      margin: 3px 0;
    }

    .md-report strong {
      color: #ffa657;
    }

    .md-report em {
      color: #79c0ff;
      font-style: normal;
    }

    .md-report code {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 0.78rem;
      color: #7ee787;
    }

    .md-report table {
      border-collapse: collapse;
      width: 100%;
      margin: 8px 0;
    }

    .md-report th {
      background: #161b22;
      color: #79c0ff;
      padding: 5px 10px;
      border: 1px solid #30363d;
      text-align: left;
      font-size: 0.78rem;
    }

    .md-report td {
      padding: 4px 10px;
      border: 1px solid #30363d;
      color: #c9d1d9;
      font-size: 0.78rem;
    }

    .md-report tr:nth-child(even) td {
      background: #161b22;
    }

    .report-divider {
      color: #f0883e;
      font-size: 0.75rem;
      letter-spacing: 3px;
      margin: 8px 0 4px 0;
    }

    /* === 状态指示器 === */
    .status-bar {
      padding: 8px 16px;
      border-top: 1px solid #30363d;
      font-size: 0.75rem;
      color: #8b949e;
      display: flex;
      justify-content: space-between;
    }

    #status { color: #8b949e; }
    #status.connected { color: #7ee787; }
    #status.error { color: #ff7b72; }

    .clear-btn {
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 2px 10px;
      font-size: 0.72rem;
    }
    .clear-btn:hover { border-color: #58a6ff; color: #58a6ff; }
  </style>
</head>
<body>

<h1>// 工业故障诊断流式控制台</h1>
<div class="page-links">
  <a href="./knowledge_search.html">进入多模态知识检索页</a>
</div>

<div class="panel">
  <!-- 输入区 -->
  <div class="input-bar">
    <div class="field">
      <label>起始时间</label>
      <input type="datetime-local" id="startTime" value="2022-08-12T16:00">
    </div>
    <div class="field">
      <label>结束时间</label>
      <input type="datetime-local" id="endTime" value="2022-08-12T16:05">
    </div>
    <div class="field" style="flex:1">
      <label>症状描述</label>
      <input type="text" id="symptom" class="symptom" placeholder="例如：产品温度异常" value="产品温度异常">
    </div>
    <div class="field">
      <label>模型</label>
      <input type="text" id="modelName" placeholder="deepseek-chat" value="deepseek-chat" style="width:140px">
    </div>
    <div class="field field-wide">
      <label>后端地址</label>
      <input type="text" id="baseUrl" class="backend-url" placeholder="http://127.0.0.1:8000">
      <span class="field-note">留空时优先使用当前站点地址，否则回退到 `http://127.0.0.1:8000`。该配置会自动保存在本地浏览器。</span>
    </div>
    <button id="startBtn" onclick="startDiagnosis()">▶ 开始诊断</button>
    <button class="clear-btn" onclick="clearTerminal()">清空</button>
  </div>

  <!-- 终端区 -->
  <div class="terminal" id="terminal">
    <p class="event-timestamp">[系统] 等待发起诊断请求...</p>
  </div>

  <!-- 状态栏 -->
  <div class="status-bar">
    <span id="status">● 就绪</span>
    <span id="eventCount">已接收事件: 0</span>
  </div>
</div>

<script>
  // ============================================================
  // 配置：后端地址（需要与 uvicorn 端口一致）
  // ============================================================
  const BASE_URL_STORAGE_KEY = 'fault-diagnosis-base-url';
  const FALLBACK_BASE_URL = 'http://127.0.0.1:8000';
  const CONNECT_TIMEOUT_MS = 8000;

  // 配置 marked.js：使用 GFM（表格、删除线等）
  marked.use({
    gfm: true,
    breaks: true,
  });

  let es = null;
  let eventCount = 0;
  let connectTimeoutId = null;
  let streamConnected = false;

  // ============================================================
  // 发起诊断请求
  // ============================================================
  function initializePage() {
    const baseUrlInput = document.getElementById('baseUrl');
    baseUrlInput.value = getInitialBaseUrl();
  }

  function getInitialBaseUrl() {
    const saved = localStorage.getItem(BASE_URL_STORAGE_KEY);
    if (saved) {
      return saved;
    }

    if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
      return window.location.origin;
    }

    return FALLBACK_BASE_URL;
  }

  function normalizeBaseUrl(rawValue) {
    const candidate = (rawValue || '').trim() || getInitialBaseUrl();

    let parsed;
    try {
      parsed = new URL(candidate);
    } catch {
      throw new Error('后端地址格式无效，请输入 http:// 或 https:// 开头的地址。');
    }

    if (!['http:', 'https:'].includes(parsed.protocol)) {
      throw new Error('后端地址只支持 http:// 或 https://。');
    }

    return parsed.href.replace(/\/$/, '');
  }

  function validateForm() {
    const startTime = document.getElementById('startTime').value;
    const endTime = document.getElementById('endTime').value;
    const symptom = document.getElementById('symptom').value.trim();
    const modelName = document.getElementById('modelName').value.trim();
    const rawBaseUrl = document.getElementById('baseUrl').value;

    if (!startTime || !endTime) {
      throw new Error('请先填写完整的起始时间和结束时间。');
    }

    const startDate = new Date(startTime);
    const endDate = new Date(endTime);
    if (Number.isNaN(startDate.getTime()) || Number.isNaN(endDate.getTime())) {
      throw new Error('时间格式无效，请使用页面提供的时间选择器。');
    }

    if (endDate <= startDate) {
      throw new Error('结束时间必须晚于起始时间。');
    }

    return {
      startTime,
      endTime,
      symptom,
      modelName,
      baseUrl: normalizeBaseUrl(rawBaseUrl),
    };
  }

  function formatDateTimeLocal(dateTimeLocal) {
    return dateTimeLocal.replace('T', ' ') + ':00';
  }

  function buildStreamUrl(payload) {
    const params = new URLSearchParams();
    params.set('start_time', payload.start_time);
    params.set('end_time', payload.end_time);
    params.set('model_provider', payload.model_provider);
    params.set('model_name', payload.model_name);
    if (payload.symptom_description) {
      params.set('symptom_description', payload.symptom_description);
    }
    return `/api/v1/diagnose/stream?${params.toString()}`;
  }

  function parseEventData(raw, fallback = {}) {
    if (raw === undefined || raw === null || raw === '') {
      return fallback;
    }

    try {
      return JSON.parse(raw);
    } catch {
      return fallback;
    }
  }

  function setRunningState(isRunning) {
    document.getElementById('startBtn').disabled = isRunning;
  }

  function clearConnectTimeout() {
    if (connectTimeoutId) {
      clearTimeout(connectTimeoutId);
      connectTimeoutId = null;
    }
  }

  function closeStream() {
    clearConnectTimeout();
    if (es) {
      es.close();
      es = null;
    }
  }

  function handleClientError(message, detail = '') {
    if (detail) {
      log(`[错误详情] ${detail}`, 'event-error');
    }
    log(`[错误] ${message}`, 'event-error');
    setStatus('● 错误', 'error');
    setRunningState(false);
    closeStream();
  }

  function scheduleConnectTimeout(baseUrl) {
    clearConnectTimeout();
    connectTimeoutId = setTimeout(() => {
      if (!streamConnected && es) {
        handleClientError(
          '连接超时，8 秒内未收到服务确认。',
          `请检查后端地址 ${baseUrl}、服务是否已启动，以及浏览器是否能访问该地址。`
        );
      }
    }, CONNECT_TIMEOUT_MS);
  }

  function startDiagnosis() {
    let formData;
    try {
      formData = validateForm();
    } catch (error) {
      clearTerminal();
      handleClientError(error.message);
      return;
    }

    clearTerminal();
    setStatus('● 连接中...', '');
    setRunningState(true);
    streamConnected = false;

    const payload = {
      start_time: formatDateTimeLocal(formData.startTime),
      end_time: formatDateTimeLocal(formData.endTime),
      symptom_description: formData.symptom || null,
      model_provider: 'openai',
      model_name: formData.modelName || 'deepseek-chat'
    };

    // 拼接 SSE URL（GET 方式，query 参数）
    const url = buildStreamUrl(payload);
    localStorage.setItem(BASE_URL_STORAGE_KEY, formData.baseUrl);

    log('开始连接 SSE 流式端点...', 'event-timestamp');
    log(`后端地址: ${formData.baseUrl}`, 'event-timestamp');
    log(`请求地址: ${url}`, 'event-timestamp');
    log(`时间范围: ${payload.start_time} ~ ${payload.end_time}`, 'event-timestamp');
    log('---', 'event-timestamp');

    // 关闭已有连接
    closeStream();

    es = new EventSource(new URL(url, `${formData.baseUrl}/`).toString());
    scheduleConnectTimeout(formData.baseUrl);

    es.addEventListener('connected', (e) => {
      streamConnected = true;
      clearConnectTimeout();
      const raw = (e.data === undefined || e.data === null) ? '{}' : e.data;
      let data;
      try { data = JSON.parse(raw); } catch { data = raw; }
      const status = (typeof data === 'object' && data !== null) ? data.status : data;
      log(`[连接成功] ${status}`, 'event-timestamp');
      setStatus('● 诊断中...', 'connected');
    });

    es.addEventListener('node_start', (e) => {
      const d = parseEventData(e.data, { node: 'unknown', message: '节点开始执行' });
      log(`[节点开始] ${d.node} → ${d.message}`, 'event-node_start');
      eventCount++;
      document.getElementById('eventCount').textContent = `已接收事件: ${eventCount}`;
    });

    es.addEventListener('node_finish', (e) => {
      const d = parseEventData(e.data, { node: 'unknown', status: 'done' });
      const extra = d.preview ? ` | ${d.preview.slice(0, 60)}...` :
                    d.next     ? ` | 下一步: ${d.next}` : '';
      log(`[节点完成] ${d.node}${extra}`, 'event-node_finish');
      eventCount++;
      document.getElementById('eventCount').textContent = `已接收事件: ${eventCount}`;
    });

    es.addEventListener('report', (e) => {
      const d = parseEventData(e.data, { report: '报告为空。' });
      logReport(d.report);
      eventCount++;
      document.getElementById('eventCount').textContent = `已接收事件: ${eventCount}`;
    });

    es.addEventListener('error', (e) => {
      const d = parseEventData(e.data, { error: '服务端返回了错误事件。' });
      handleClientError(d.error);
    });

    es.addEventListener('done', (e) => {
      log(`\n[流式响应结束] ${e.data}`, 'event-done');
      setStatus('● 完成', 'connected');
      setRunningState(false);
      closeStream();
    });

    es.onerror = () => {
      const detail = streamConnected
        ? '连接在建立后中断，请检查后端日志、网络代理或接口报错。'
        : '请确认后端服务已启动、地址可访问，并检查浏览器控制台是否存在跨域或网络错误。';
      handleClientError('SSE 连接中断或服务器不可达。', detail);
    };
  }

  // ============================================================
  // 工具函数
  // ============================================================
  function log(text, cls) {
    const term = document.getElementById('terminal');
    const p = document.createElement('p');
    p.className = cls;
    p.textContent = text;
    term.appendChild(p);
    term.scrollTop = term.scrollHeight;

    // 打字机效果：给 report 类型动态加光标
    if (cls === 'event-report' && !term.querySelector('.cursor')) {
      const cur = document.createElement('span');
      cur.className = 'cursor';
      p.appendChild(cur);
      setTimeout(() => cur.remove(), 2000);
    }
  }

  /** 将诊断报告渲染为 Markdown（使用 marked.js） */
  function logReport(markdownText) {
    const term = document.getElementById('terminal');

    // 顶部装饰分隔
    const divider = document.createElement('p');
    divider.className = 'report-divider';
    divider.textContent = '━━━ 诊 断 报 告 ━━━';
    term.appendChild(divider);

    // 渲染 Markdown 为 HTML
    const html = marked.parse(markdownText || '');

    // 创建报告容器
    const container = document.createElement('div');
    container.className = 'md-report';
    container.innerHTML = html;
    term.appendChild(container);

    // 底部装饰
    const end = document.createElement('p');
    end.className = 'report-divider';
    end.textContent = '━━━━━━━━━━━━━━━━━━━━━';
    term.appendChild(end);

    term.scrollTop = term.scrollHeight;
  }

  function setStatus(text, cls) {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = cls || '';
  }

  function clearTerminal() {
    const term = document.getElementById('terminal');
    term.innerHTML = '';
    eventCount = 0;
    document.getElementById('eventCount').textContent = '已接收事件: 0';
    setStatus('● 就绪', '');
    setRunningState(false);
    streamConnected = false;
    closeStream();
  }

  initializePage();
</script>

</body>
</html>
